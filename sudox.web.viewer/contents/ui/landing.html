<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background-color: #1f1f1f;
    font-family: sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 6px;
}
img { width: 120px; height: 120px; object-fit: contain; }
.welcome { color: #5e9ca0; font-size: 0.9em; margin-bottom: 0; }
.title {
    font-size: 2.4em;
    font-weight: bold;
    background: linear-gradient(32deg, rgba(0,232,255,1) 0%, rgba(0,232,255,1) 22.7%, rgba(216,165,255,1) 24.1%, rgba(222,163,255,1) 48.1%, rgba(135,255,234,1) 49.5%, rgba(135,255,234,1) 73.2%, rgba(239,144,253,1) 74.7%, rgba(248,135,255,1) 100%);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: wave 12s linear infinite;
}
@keyframes wave {
    0% { background-position: 100% 0%; }
    100% { background-position: -200% 200%; }
}
h2 { color: #ff0099; font-size: 0.95em; font-weight: normal; margin-top: 4px; }
a { color: #87ffea; text-decoration: none; }
a:hover { text-decoration: underline; }
p { color: #888; font-size: 0.8em; margin-top: 4px; }
</style>
</head>
<body>
<img src="../images/sudoxweb.png" />
<div class="welcome">welcome to</div>
<div class="title">sudoxweb</div>
<h2>configure your url in the widget settings</h2>
<p>more projects at: <a href="https://sudoxreboot.com">sudoxreboot.com</a></p>
</body>
</html>
